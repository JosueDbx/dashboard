<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dashboard Mesa de Ayuda — SharePoint Live</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#08152b; --panel:#0c2344; --card:#0b1e3a; --bd:#143055;
--txt:#e7eefc; --muted:#a9c0ea;
}
html,body{background:var(--bg);color:var(--txt);}
body{font-family:system-ui;margin:20px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.panel{display:flex;gap:10px;background:var(--panel);
border:1px solid var(--bd);padding:10px;border-radius:10px;margin:10px 0}
.input,.btn{padding:8px 10px;background:var(--panel);
color:var(--txt);border:1px solid var(--bd);border-radius:8px}
.btn{cursor:pointer}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:12px 0}
.kpi{background:#0d2140;border:1px solid var(--bd);border-radius:10px;padding:12px}
.kpi h2{margin:0;font-size:28px}
.kpi p{margin:4px 0 0;color:var(--muted)}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px}
canvas{max-height:340px}
.muted{color:var(--muted)}
.ok{color:#22c55e}
.err{color:#ef4444}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #143055;padding:6px}
th{background:#0d2140}
</style>
</head>

<body>

<h1>Dashboard Mesa de Ayuda — SharePoint Live</h1>

<div class="panel">
<input id="dataUrl" class="input" style="flex:1"
placeholder="Pega aquí la URL directa de records.json"/>
<button class="btn" id="btnSaveUrl">Guardar URL</button>
<button class="btn" id="btnLoad">Cargar ahora</button>
<button class="btn" id="btnSample">Cargar muestra</button>
<small id="status" class="muted">Listo</small>
</div>

<div class="kpi-grid">
<div class="kpi"><h2 id="kpiTickets">0</h2><p>Total tickets</p></div>
<div class="kpi"><h2 id="kpiHoras">0</h2><p>Horas totales</p></div>
<div class="kpi"><h2 id="kpiFunc">0</h2><p>Horas funcionales</p></div>
<div class="kpi"><h2 id="kpiAbap">0</h2><p>Horas ABAP</p></div>
</div>

<div class="charts">
<div class="card"><h3>Tickets por mes</h3><canvas id="chartMes"></canvas></div>
<div class="card"><h3>Horas por mes</h3><canvas id="chartHours"></canvas></div>
<div class="card"><h3>Horas por módulo</h3><canvas id="chartMod"></canvas></div>
<div class="card"><h3>Distribución por estatus</h3><canvas id="chartStatus"></canvas></div>
</div>

<div class="card" style="margin-top:20px">
<h3>Detalle</h3>
<input id="searchInput" class="input" placeholder="Buscar..." style="margin-bottom:10px;width:100%"/>
<table id="detailTable"></table>
</div>

<script>

function msg(text,cls){
const s=document.getElementById('status');
s.textContent=text;
s.className=cls||'muted';
}

function toNumber(x){
const n=parseFloat(String(x||0).replace(',','.'));
return isNaN(n)?0:n;
}

function computeAggregations(rows){

const recs=rows.map(r=>({
...r,
hF:toNumber(r["Hrs funcionales"]),
hA:toNumber(r["Hrs abap"]),
hT:toNumber(r["Horas totales"])
}));

const summary={tickets:recs.length,hTot:0,hF:0,hA:0};
const byMes={},byMesHoras={},byMod={},bySt={};

recs.forEach(r=>{

summary.hTot+=r.hT;
summary.hF+=r.hF;
summary.hA+=r.hA;

let mes="Sin fecha";
if(r["Fecha de creacion"]){
const d=new Date(r["Fecha de creacion"]);
if(!isNaN(d))
mes=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

byMes[mes]=(byMes[mes]||0)+1;
byMesHoras[mes]=(byMesHoras[mes]||0)+r.hT;

const mod=r["Modulo"]||"Sin módulo";
byMod[mod]=(byMod[mod]||0)+r.hT;

const st=r["Estatus"]||"Sin estatus";
bySt[st]=(bySt[st]||0)+1;

});

return{recs,summary,byMes,byMesHoras,byMod,bySt};
}

function renderKPIs(agg){
document.getElementById('kpiTickets').textContent=agg.summary.tickets.toLocaleString('es-MX');
document.getElementById('kpiHoras').textContent=agg.summary.hTot.toLocaleString('es-MX');
document.getElementById('kpiFunc').textContent=agg.summary.hF.toLocaleString('es-MX');
document.getElementById('kpiAbap').textContent=agg.summary.hA.toLocaleString('es-MX');
}

let chMes,chHours,chMod,chStatus;

function renderCharts(agg){

if(chMes)chMes.destroy();
if(chHours)chHours.destroy();
if(chMod)chMod.destroy();
if(chStatus)chStatus.destroy();

chMes=new Chart(document.getElementById('chartMes'),{
type:'bar',
data:{labels:Object.keys(agg.byMes),
datasets:[{label:'Tickets',
data:Object.values(agg.byMes),
backgroundColor:'#64a3ff'}]}
});

chHours=new Chart(document.getElementById('chartHours'),{
type:'line',
data:{labels:Object.keys(agg.byMesHoras),
datasets:[{label:'Horas',
data:Object.values(agg.byMesHoras),
borderColor:'#5ad1a5',
backgroundColor:'rgba(90,209,165,.2)',
fill:true,tension:.3}]}
});

chMod=new Chart(document.getElementById('chartMod'),{
type:'bar',
data:{labels:Object.keys(agg.byMod),
datasets:[{label:'Horas por módulo',
data:Object.values(agg.byMod),
backgroundColor:'#ffb454'}]},
options:{indexAxis:'y'}
});

chStatus=new Chart(document.getElementById('chartStatus'),{
type:'doughnut',
data:{labels:Object.keys(agg.bySt),
datasets:[{data:Object.values(agg.bySt),
backgroundColor:['#64a3ff','#5ad1a5','#ffb454','#ff7b7b','#b39bff','#45e0f1']}]}
});
}

function renderTable(agg){

const table=document.getElementById('detailTable');
const search=document.getElementById('searchInput');

if(!agg.recs.length){
table.innerHTML="<tr><td>Sin datos</td></tr>";
return;
}

const headers=Object.keys(agg.recs[0]);

function draw(data){
table.innerHTML=
"<thead><tr>"+
headers.map(h=>`<th>${h}</th>`).join('')+
"</tr></thead><tbody>"+
data.map(r=>"<tr>"+
headers.map(h=>`<td>${r[h]??''}</td>`).join('')+
"</tr>").join('')+
"</tbody>";
}

draw(agg.recs);

search.oninput=function(){
const term=this.value.toLowerCase();
const filtered=agg.recs.filter(r=>
Object.values(r).some(v=>
String(v).toLowerCase().includes(term)
));
draw(filtered);
};
}

async function fetchSP(url){
msg('Cargando...','muted');
try{
const r=await fetch(url);
if(!r.ok)throw new Error(r.status);
const data=await r.json();
msg('OK ('+data.length+' registros)','ok');
return data;
}catch(e){
msg('Error HTTP '+e.message,'err');
return null;
}
}

function sampleData(){
return[
{"Fecha de creacion":"2026-01-10","Modulo":"SD","Estatus":"Cerrado","Hrs funcionales":"2","Hrs abap":"1","Horas totales":"3"},
{"Fecha de creacion":"2026-01-15","Modulo":"MM","Estatus":"Abierto","Hrs funcionales":"1","Hrs abap":"0","Horas totales":"1"},
{"Fecha de creacion":"2026-02-01","Modulo":"FI","Estatus":"En progreso","Hrs funcionales":"3","Hrs abap":"2","Horas totales":"5"}
];
}

document.addEventListener('DOMContentLoaded',function(){

const input=document.getElementById('dataUrl');
const saved=localStorage.getItem('dashboardUrl');
if(saved)input.value=saved;

document.getElementById('btnSaveUrl').addEventListener('click',()=>{
const v=input.value.trim();
if(v){
localStorage.setItem('dashboardUrl',v);
msg('URL guardada','ok');
}
});

document.getElementById('btnLoad').addEventListener('click',async()=>{
const url=input.value.trim();
if(!url){alert('Captura la URL');return;}
const rows=await fetchSP(url);
if(!rows)return;
const agg=computeAggregations(rows);
renderKPIs(agg);
renderCharts(agg);
renderTable(agg);
});

document.getElementById('btnSample').addEventListener('click',()=>{
const rows=sampleData();
const agg=computeAggregations(rows);
renderKPIs(agg);
renderCharts(agg);
renderTable(agg);
msg('Datos de muestra cargados','ok');
});

});

</script>

</body>
</html>
