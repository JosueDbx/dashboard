<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dashboard Mesa de Ayuda — Executive</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#08152b; --panel:#0c2344; --card:#0b1e3a; --bd:#143055;
--txt:#e7eefc; --muted:#a9c0ea;
}
html,body{background:var(--bg);color:var(--txt);}
body{font-family:system-ui;margin:20px;transition:all .3s ease}
.panel{display:flex;gap:10px;flex-wrap:wrap;
background:var(--panel);border:1px solid var(--bd);
padding:10px;border-radius:10px;margin-bottom:15px}
.input,.btn,select{
padding:8px 10px;background:var(--panel);
color:var(--txt);border:1px solid var(--bd);
border-radius:8px}
.btn{cursor:pointer}
.kpi-grid{display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;margin:12px 0}
.kpi{background:#0d2140;border:1px solid var(--bd);
border-radius:10px;padding:12px;text-align:center}
.kpi h2{margin:0;font-size:28px}
.kpi p{margin:4px 0 0;color:var(--muted)}
.charts{display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:16px}
.card{background:var(--card);
border:1px solid var(--bd);
border-radius:10px;padding:12px}
canvas{max-height:340px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #143055;padding:6px}
th{background:#0d2140}
.hidden{display:none}
.presentation .panel,
.presentation #detailSection{display:none}
.presentation .kpi-grid{grid-template-columns:repeat(5,1fr)}
.presentation canvas{max-height:500px}
</style>
</head>

<body>

<h1>Dashboard Mesa de Ayuda — Executive</h1>

<div class="panel" id="controlPanel">
<input id="dataUrl" class="input" style="flex:1"
placeholder="Pega aquí la URL directa de records.json"/>
<button class="btn" id="btnSaveUrl">Guardar URL</button>
<button class="btn" id="btnLoad">Cargar ahora</button>
<button class="btn" id="btnSample">Cargar muestra</button>
<button class="btn" id="btnExport">Exportar Excel</button>
<button class="btn" id="btnPresentation">Modo Presentación</button>
<small id="status">Listo</small>
</div>

<div class="panel">
<label>Módulo:</label>
<select id="modFilter"><option value="ALL">Todos</option></select>

<label>Estatus:</label>
<select id="statusFilter"><option value="ALL">Todos</option></select>
</div>

<div class="kpi-grid">
<div class="kpi"><h2 id="kpiTickets">0</h2><p>Total Tickets</p></div>
<div class="kpi"><h2 id="kpiHoras">0</h2><p>Horas Totales</p></div>
<div class="kpi"><h2 id="kpiFunc">0</h2><p>Horas Funcionales</p></div>
<div class="kpi"><h2 id="kpiAbap">0</h2><p>Horas ABAP</p></div>
<div class="kpi"><h2 id="kpiProd">0</h2><p>Productividad Promedio (hrs/ticket)</p></div>
</div>

<div class="charts">
<div class="card"><h3>Tickets por Mes</h3><canvas id="chartMes"></canvas></div>
<div class="card"><h3>Horas por Mes</h3><canvas id="chartHours"></canvas></div>
<div class="card"><h3>Horas por Módulo</h3><canvas id="chartMod"></canvas></div>
<div class="card"><h3>Distribución por Estatus</h3><canvas id="chartStatus"></canvas></div>
</div>

<div class="card" id="detailSection" style="margin-top:20px">
<h3>Detalle</h3>
<input id="searchInput" class="input" placeholder="Buscar..."
style="margin-bottom:10px;width:100%"/>
<table id="detailTable"></table>
</div>

<script>

let globalRows=[];
let chMes,chHours,chMod,chStatus;

function toNumber(x){
const n=parseFloat(String(x||0).replace(',','.'));
return isNaN(n)?0:n;
}

function populateFilters(rows){
const modSel=document.getElementById('modFilter');
const stSel=document.getElementById('statusFilter');

const mods=[...new Set(rows.map(r=>r["Modulo"]||"Sin módulo"))].sort();
const sts=[...new Set(rows.map(r=>r["Estatus"]||"Sin estatus"))].sort();

modSel.innerHTML='<option value="ALL">Todos</option>';
stSel.innerHTML='<option value="ALL">Todos</option>';

mods.forEach(m=>{
const o=document.createElement('option');
o.value=m;o.textContent=m;modSel.appendChild(o);
});
sts.forEach(s=>{
const o=document.createElement('option');
o.value=s;o.textContent=s;stSel.appendChild(o);
});
}

function computeAggregations(rows){

const mod=document.getElementById('modFilter').value;
const st=document.getElementById('statusFilter').value;

const recs=rows
.filter(r=>(mod==="ALL"||r["Modulo"]===mod))
.filter(r=>(st==="ALL"||r["Estatus"]===st))
.map(r=>({
...r,
hF:toNumber(r["Hrs funcionales"]),
hA:toNumber(r["Hrs abap"]),
hT:toNumber(r["Horas totales"])
}));

const summary={tickets:recs.length,hTot:0,hF:0,hA:0};

const byMes={},byMesHoras={},byMod={},bySt={};

recs.forEach(r=>{
summary.hTot+=r.hT;
summary.hF+=r.hF;
summary.hA+=r.hA;

let mes="Sin fecha";
if(r["Fecha de creacion"]){
const d=new Date(r["Fecha de creacion"]);
if(!isNaN(d))
mes=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

byMes[mes]=(byMes[mes]||0)+1;
byMesHoras[mes]=(byMesHoras[mes]||0)+r.hT;
byMod[r["Modulo"]||"Sin módulo"]=(byMod[r["Modulo"]||"Sin módulo"]||0)+r.hT;
bySt[r["Estatus"]||"Sin estatus"]=(bySt[r["Estatus"]||"Sin estatus"]||0)+1;
});

summary.productividad = summary.tickets>0 ? (summary.hTot/summary.tickets) : 0;

return{recs,summary,byMes,byMesHoras,byMod,bySt};
}

function renderKPIs(agg){
kpiTickets.textContent=agg.summary.tickets;
kpiHoras.textContent=agg.summary.hTot.toFixed(1);
kpiFunc.textContent=agg.summary.hF.toFixed(1);
kpiAbap.textContent=agg.summary.hA.toFixed(1);
kpiProd.textContent=agg.summary.productividad.toFixed(2);
}

function renderCharts(agg){

if(chMes)chMes.destroy();
if(chHours)chHours.destroy();
if(chMod)chMod.destroy();
if(chStatus)chStatus.destroy();

chMes=new Chart(chartMes,{
type:'bar',
data:{labels:Object.keys(agg.byMes),
datasets:[{label:'Tickets',
data:Object.values(agg.byMes),
backgroundColor:'#64a3ff'}]}
});

chHours=new Chart(chartHours,{
type:'line',
data:{labels:Object.keys(agg.byMesHoras),
datasets:[{label:'Horas',
data:Object.values(agg.byMesHoras),
borderColor:'#5ad1a5',
backgroundColor:'rgba(90,209,165,.2)',
fill:true}]}
});

chMod=new Chart(chartMod,{
type:'bar',
data:{labels:Object.keys(agg.byMod),
datasets:[{label:'Horas',
data:Object.values(agg.byMod),
backgroundColor:'#ffb454'}]},
options:{indexAxis:'y'}
});

chStatus=new Chart(chartStatus,{
type:'doughnut',
data:{labels:Object.keys(agg.bySt),
datasets:[{data:Object.values(agg.bySt),
backgroundColor:['#64a3ff','#5ad1a5','#ffb454',
'#ff7b7b','#b39bff','#45e0f1']}]}
});
}

function updateDashboard(){
const agg=computeAggregations(globalRows);
renderKPIs(agg);
renderCharts(agg);
renderTable(agg);
}

function renderTable(agg){
const table=document.getElementById('detailTable');
const search=document.getElementById('searchInput');

if(!agg.recs.length){table.innerHTML="<tr><td>Sin datos</td></tr>";return;}

const headers=Object.keys(agg.recs[0]);

function draw(data){
table.innerHTML=
"<thead><tr>"+headers.map(h=>`<th>${h}</th>`).join('')+
"</tr></thead><tbody>"+
data.map(r=>"<tr>"+
headers.map(h=>`<td>${r[h]??''}</td>`).join('')+
"</tr>").join('')+"</tbody>";
}

draw(agg.recs);

search.oninput=function(){
const term=this.value.toLowerCase();
draw(agg.recs.filter(r=>
Object.values(r).some(v=>
String(v).toLowerCase().includes(term)
)));
};
}

function exportToExcel(){
const agg=computeAggregations(globalRows);
let csv=Object.keys(agg.recs[0]).join(",")+"\n";
agg.recs.forEach(r=>{
csv+=Object.values(r).map(v=>`"${v??''}"`).join(",")+"\n";
});
const blob=new Blob([csv],{type:"text/csv"});
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="dashboard_export.csv";
link.click();
}

document.addEventListener('DOMContentLoaded',function(){

btnLoad.onclick=async()=>{
const url=dataUrl.value.trim();
if(!url)return;
const r=await fetch(url);
const rows=await r.json();
globalRows=rows;
populateFilters(rows);
updateDashboard();
};

btnSample.onclick=()=>{
globalRows=[
{"Fecha de creacion":"2026-01-10","Modulo":"SD","Estatus":"Cerrado","Hrs funcionales":"2","Hrs abap":"1","Horas totales":"3"},
{"Fecha de creacion":"2026-01-15","Modulo":"MM","Estatus":"Abierto","Hrs funcionales":"1","Hrs abap":"0","Horas totales":"1"},
{"Fecha de creacion":"2026-02-01","Modulo":"FI","Estatus":"En progreso","Hrs funcionales":"3","Hrs abap":"2","Horas totales":"5"}
];
populateFilters(globalRows);
updateDashboard();
};

btnExport.onclick=exportToExcel;

modFilter.onchange=updateDashboard;
statusFilter.onchange=updateDashboard;

btnPresentation.onclick=()=>{
document.body.classList.toggle('presentation');
};

});

</script>

</body>
</html>
